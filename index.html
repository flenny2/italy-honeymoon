<!-- ═══════════════════════════════════ -->
<!-- PAGE: MAP (dedicated tab)           -->
<!-- ═══════════════════════════════════ -->
<div id="page-map" class="page">
  <!-- City bar (compact, always all visible) -->
  <div id="map-city-bar" class="map-city-bar">
    <button class="map-city-chip active" data-city="all" onclick="mapJumpTo('all')">
      <span class="mcc-emoji">🇮🇹</span><span class="mcc-label">All</span>
    </button>
    <button class="map-city-chip" data-city="Rome" onclick="mapJumpTo('Rome')">
      <span class="mcc-emoji">🏛️</span><span class="mcc-label">Rome</span>
    </button>
    <button class="map-city-chip" data-city="Florence" onclick="mapJumpTo('Florence')">
      <span class="mcc-emoji">🌻</span><span class="mcc-label">Florence</span>
    </button>
    <button class="map-city-chip" data-city="Lake Como" onclick="mapJumpTo('Lake Como')">
      <span class="mcc-emoji">⛰️</span><span class="mcc-label">Como</span>
    </button>
    <button class="map-city-chip" data-city="Venice" onclick="mapJumpTo('Venice')">
      <span class="mcc-emoji">🚣</span><span class="mcc-label">Venice</span>
    </button>
  </div>
  <!-- Filter button (opens modal) + active filter indicator -->
  <div class="map-controls">
    <button id="map-filter-btn" class="map-filter-btn" onclick="openMapFilters()">
      <span>⚙️</span> <span id="map-filter-label">All Places</span> <span class="map-filter-arrow">▾</span>
    </button>
  </div>
  <!-- Map container -->
  <div id="full-map"></div>

  <!-- Filter Modal -->
  <div id="map-filter-modal" class="map-filter-modal" role="dialog" aria-modal="true" aria-label="Map filters">
    <div class="map-filter-sheet">
      <div class="mfm-header">
        <h3>🗺️ Map Filters</h3>
        <button class="mfm-close" onclick="closeMapFilters()">✕</button>
      </div>
      <div class="mfm-body">
        <div class="mfm-section">
          <div class="mfm-section-title">By Verdict</div>
          <div class="mfm-grid">
            <button class="mfm-option" data-filter="essential" onclick="applyMapFilter('essential','🟢 Essential')">
              <span class="mfm-icon" style="background:#E8F5EC;color:#008C45;">🟢</span>Essential
            </button>
            <button class="mfm-option" data-filter="hidden-gem" onclick="applyMapFilter('hidden-gem','💎 Hidden Gems')">
              <span class="mfm-icon" style="background:#EDE9FE;color:#8B5CF6;">💎</span>Hidden Gems
            </button>
            <button class="mfm-option" data-filter="worth-it" onclick="applyMapFilter('worth-it','🔵 Worth It')">
              <span class="mfm-icon" style="background:#DBEAFE;color:#3B82F6;">🔵</span>Worth It
            </button>
          </div>
        </div>
        <div class="mfm-section">
          <div class="mfm-section-title">By Source</div>
          <div class="mfm-grid">
            <button class="mfm-option" data-filter="nathan" onclick="applyMapFilter('nathan','👨‍🍳 Nathan Recs')">
              <span class="mfm-icon" style="background:#FFF8E1;color:#C9A028;">👨‍🍳</span>Nathan Recs
            </button>
            <button class="mfm-option" data-filter="hotel" onclick="applyMapFilter('hotel','🏨 Hotel Recs')">
              <span class="mfm-icon" style="background:#FFF0F1;color:#CE2B37;">🏨</span>Hotel Recs
            </button>
            <button class="mfm-option" data-filter="goop" onclick="applyMapFilter('goop','📖 Goop Guide')">
              <span class="mfm-icon" style="background:#FCE7F3;color:#EC4899;">📖</span>Goop Guide
            </button>
          </div>
        </div>
        <div class="mfm-section">
          <div class="mfm-section-title">By Type</div>
          <div class="mfm-grid">
            <button class="mfm-option" data-filter="dining" onclick="applyMapFilter('dining','🍝 Dining')">
              <span class="mfm-icon" style="background:#FFEAEC;color:#CE2B37;">🍝</span>Dining
            </button>
            <button class="mfm-option" data-filter="landmark" onclick="applyMapFilter('landmark','🏛️ Sights')">
              <span class="mfm-icon" style="background:#E8F5EC;color:#008C45;">🏛️</span>Sights
            </button>
            <button class="mfm-option" data-filter="activity" onclick="applyMapFilter('activity','🎯 Activities')">
              <span class="mfm-icon" style="background:#FFF7ED;color:#F97316;">🎯</span>Activities
            </button>
            <button class="mfm-option" data-filter="viewpoint" onclick="applyMapFilter('viewpoint','👁️ Viewpoints')">
              <span class="mfm-icon" style="background:#EDE9FE;color:#8B5CF6;">👁️</span>Viewpoints
            </button>
          </div>
        </div>
        <div class="mfm-section">
          <div class="mfm-section-title">By Mood</div>
          <div class="mfm-grid">
            <button class="mfm-option" data-filter="romantic" onclick="applyMapFilter('romantic','💑 Romantic')">
              <span class="mfm-icon" style="background:#FCE7F3;color:#EC4899;">💑</span>Romantic
            </button>
            <button class="mfm-option" data-filter="evening" onclick="applyMapFilter('evening','🌙 Evening')">
              <span class="mfm-icon" style="background:#EDE9FE;color:#8B5CF6;">🌙</span>Evening
            </button>
            <button class="mfm-option" data-filter="budget" onclick="applyMapFilter('budget','💰 Budget')">
              <span class="mfm-icon" style="background:#E8F5EC;color:#008C45;">💰</span>Budget
            </button>
            <button class="mfm-option" data-filter="foodie" onclick="applyMapFilter('foodie','🍽️ Foodie')">
              <span class="mfm-icon" style="background:#FFF8E1;color:#C9A028;">🍽️</span>Foodie
            </button>
          </div>
        </div>
      </div>
      <div class="mfm-footer">
        <button class="btn btn-ghost btn-full" onclick="applyMapFilter('all','All Places')">Show All — Reset</button>
      </div>
    </div>
  </div>
</div>

  <button class="tab-btn" data-tab="phrases" onclick="Router.navigate('#phrasebook')" role="tab" aria-label="Italian phrasebook">
